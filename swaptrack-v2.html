<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwapTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080a;
  --s1:#0d0f12;
  --s2:#131619;
  --s3:#191d21;
  --s4:#1f2428;
  --s5:#262b30;
  --b1:rgba(255,255,255,0.055);
  --b2:rgba(255,255,255,0.10);
  --b3:rgba(255,255,255,0.16);
  --t1:#f2f4f6;
  --t2:#9aa3ac;
  --t3:#5a6470;
  --green:#1db37e;
  --green2:#17956a;
  --red:#e05555;
  --amber:#d4920a;
  --blue:#3d8ef0;
  --cyan:#12b8c4;
  --font:'Instrument Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --display:'Syne',sans-serif;
}
html{background:var(--bg);color:var(--t1);font-family:var(--font);font-size:14px;line-height:1.55}
body{min-height:100vh}
button{cursor:pointer;font-family:var(--font);border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--font);color:var(--t1)}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* LAYOUT */
.shell{display:flex;min-height:100vh}
.rail{width:56px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;align-items:center;padding:14px 0;position:sticky;top:0;height:100vh;z-index:50}
.sidebar{width:200px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;min-width:0;overflow-y:auto}

/* RAIL */
.rail-logo{width:34px;height:34px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;flex-shrink:0}
.rail-btn{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--t3);cursor:pointer;transition:all .15s;margin-bottom:4px;position:relative}
.rail-btn:hover{background:var(--s3);color:var(--t2)}
.rail-btn.active{background:var(--s3);color:var(--t1)}
.rail-tooltip{position:absolute;left:48px;background:var(--s4);border:1px solid var(--b2);border-radius:6px;padding:5px 10px;font-size:12px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:100}
.rail-btn:hover .rail-tooltip{opacity:1}
.notif-badge{position:absolute;top:6px;right:6px;width:6px;height:6px;background:var(--red);border-radius:50%}

/* SIDEBAR */
.sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--b1)}
.sb-logo{font-family:var(--display);font-size:17px;font-weight:700;letter-spacing:.5px}
.sb-sub{font-size:11px;color:var(--t3);margin-top:1px}
.sb-nav{padding:10px 8px;flex:1}
.sb-section{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--t3);padding:12px 10px 5px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--t2);transition:all .15s;margin-bottom:1px}
.sb-item:hover{background:var(--s3);color:var(--t1)}
.sb-item.active{background:var(--s3);color:var(--t1);font-weight:500}
.sb-foot{padding:12px 14px;border-top:1px solid var(--b1)}
.sb-user{display:flex;align-items:center;gap:9px}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 26px 16px;border-bottom:1px solid var(--b1)}
.pg-title{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:.2px}
.pg-sub{font-size:12px;color:var(--t3);margin-top:2px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--font);border:none}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green2)}
.btn-ghost{background:var(--s3);color:var(--t1);border:1px solid var(--b2)}
.btn-ghost:hover{background:var(--s4);border-color:var(--b3)}
.btn-danger{background:rgba(224,85,85,.1);color:var(--red);border:1px solid rgba(224,85,85,.2)}
.btn-danger:hover{background:rgba(224,85,85,.18)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:7px}

/* CARDS */
.card{background:var(--s2);border:1px solid var(--b1);border-radius:11px}
.card-pad{padding:18px 20px}
.card-sm{padding:13px 16px}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:18px 26px}
.stat{background:var(--s2);border:1px solid var(--b1);border-radius:11px;padding:16px 18px}
.stat-n{font-family:var(--mono);font-size:24px;font-weight:500;margin-bottom:3px}
.stat-l{font-size:11px;color:var(--t3);font-weight:500;letter-spacing:.3px}
.stat-d{font-size:11px;margin-top:5px;font-family:var(--mono)}

/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:500;flex-shrink:0;font-size:11px}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;font-family:var(--mono)}
.bg-green{background:rgba(29,179,126,.12);color:var(--green)}
.bg-red{background:rgba(224,85,85,.12);color:var(--red)}
.bg-amber{background:rgba(212,146,10,.12);color:var(--amber)}
.bg-blue{background:rgba(61,142,240,.12);color:var(--blue)}
.bg-gray{background:var(--s4);color:var(--t2)}
.bg-cyan{background:rgba(18,184,196,.12);color:var(--cyan)}

/* SEARCH */
.search-wrap{position:relative}
.search-inp{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:9px 12px 9px 36px;color:var(--t1);font-size:13px;outline:none;transition:border-color .15s}
.search-inp:focus{border-color:var(--green)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);padding:9px 14px;text-align:left;border-bottom:1px solid var(--b1)}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--b1);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(255,255,255,.015);cursor:pointer}

/* SWAP ROW */
.swap-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .12s}
.swap-row:hover{background:rgba(255,255,255,.02)}
.swap-row:last-child{border-bottom:none}
.swap-accent{width:3px;height:36px;border-radius:2px;flex-shrink:0}

/* FILTERS */
.filter-row{display:flex;gap:8px;padding:14px 26px;flex-wrap:wrap;align-items:center}
.filter-chip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--b2);color:var(--t2);cursor:pointer;transition:all .15s;background:var(--s2)}
.filter-chip:hover{border-color:var(--b3);color:var(--t1)}
.filter-chip.active{background:var(--green);border-color:var(--green);color:#fff}

/* ROOM CHIP */
.room-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:500;border:1px solid}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px)}
.modal{background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:26px;width:480px;max-width:96vw;max-height:90vh;overflow-y:auto}
.modal-hd{font-family:var(--display);font-size:17px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.form-g{margin-bottom:14px}
.form-l{font-size:11px;color:var(--t3);font-weight:600;letter-spacing:.4px;margin-bottom:5px;display:block;text-transform:uppercase}
.form-inp{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:8px;padding:9px 12px;color:var(--t1);font-size:13px;outline:none;transition:border-color .15s}
.form-inp:focus{border-color:var(--green)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-inp option{background:var(--s3)}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--s3);border:1px solid var(--b2);border-radius:9px;padding:11px 16px;font-size:13px;z-index:500;display:flex;align-items:center;gap:9px;animation:toastIn .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* OFFER CARD */
.offer-card{background:var(--s2);border:1px solid var(--b1);border-radius:11px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.offer-card.incoming{border-left:3px solid var(--amber)}
.offer-card.sent{border-left:3px solid var(--blue)}

/* PLAYER CARD */
.player-card{background:var(--s2);border:1px solid var(--b1);border-radius:11px;padding:18px;cursor:pointer;transition:all .15s}
.player-card:hover{border-color:var(--b3);background:var(--s3)}

/* ONLINE DOT */
.online{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px}
.offline{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--t3);margin-right:5px}

/* DISPERSION */
.disp-bar{height:8px;border-radius:4px;background:var(--s4);overflow:hidden;margin-bottom:4px}
.disp-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.sim-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--b1);font-size:13px}
.sim-row:last-child{border-bottom:none}

/* PAGE CONTENT */
.content{padding:20px 26px}

/* SECTION HEADER */
.sec-hd{font-family:var(--display);font-size:14px;font-weight:600;color:var(--t2);margin-bottom:12px;letter-spacing:.2px}

/* PROFILE */
.prof-hero{background:linear-gradient(135deg,var(--s2) 0%,var(--s3) 100%);border:1px solid var(--b1);border-radius:14px;padding:24px;margin-bottom:16px}

/* DIVIDER */
.div{height:1px;background:var(--b1);margin:16px 0}

/* INPUT RANGE */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:var(--s4);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--green);cursor:pointer}

@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeUp .18s ease}

/* COL CHART */
.col-chart{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:12px}
.col-bar{flex:1;border-radius:3px 3px 0 0;min-height:4px;transition:height .6s ease}
.col-lbl{font-size:9.5px;font-family:var(--mono);color:var(--t3);text-align:center;margin-top:4px}

/* NOTIFY DOT */
.n-dot{display:inline-block;width:6px;height:6px;background:var(--red);border-radius:50%;margin-left:auto}

/* TAG */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:11px;border:1px solid var(--b2);color:var(--t2);background:var(--s3)}
</style>
</head>

  if(sw.status==='active') return null;
  return (sw.myRes*sw.pct/100) - (sw.theirRes*sw.pct/100);

  return swaps.filter(s=>s.status!=='active').reduce((a,s)=>{const b=calcBal(s);return b?a+b:a},0);

function pgDispersion() {
  // Run Monte Carlo simulation for swap ROI
  const buyin=S.dispBuyin;
  const pct=S.dispPct;
  const n=S.dispSims;

  // Simulate tournament finishes using power-law distribution
  function simResult(bi) {
    const r=Math.random();
    if(r<0.82) return 0;           // 82% bust
    if(r<0.92) return bi*1.5;     // 10% min cash
    if(r<0.97) return bi*4;       // 5% decent cash
    if(r<0.99) return bi*12;      // 2% big cash
    if(r<0.998) return bi*40;     // 0.8% final table
    return bi*120;                  // 0.2% win
  }

  let profits=[]; let wins=0; let totalProfit=0;
  for(let i=0;i<n;i++){
    const myRes=simResult(buyin);
    const theirRes=simResult(buyin);
    const profit=(myRes-theirRes)*pct/100;
    profits.push(profit);
    if(profit>0) wins++;
    totalProfit+=profit;
  }

  const avgProfit=totalProfit/n;
  const sorted=profits.slice().sort((a,b)=>a-b);
  const p5=sorted[Math.floor(n*0.05)];
  const p25=sorted[Math.floor(n*0.25)];
  const p75=sorted[Math.floor(n*0.75)];
  const p95=sorted[Math.floor(n*0.95)];
  const maxLoss=sorted[0];
  const maxWin=sorted[n-1];

  // Build histogram buckets
  const buckets=20;
  const step=(maxWin-maxLoss)/buckets;
  const hist=Array(buckets).fill(0);
  profits.forEach(p=>{
    const b=Math.min(buckets-1,Math.floor((p-maxLoss)/step));
    hist[b]++;
  });
  const maxH=Math.max(...hist);

  return `
  <div class="topbar">
    <div><div class="pg-title">Dispersion Tool</div><div class="pg-sub">Monte Carlo swap EV simulator</div></div>
  </div>
  <div class="content">
    <div style="display:grid;grid-template-columns:280px 1fr;gap:18px;">
      <div>
        <div class="sec-hd">Parameters</div>
        <div class="card card-pad">
          <div style="margin-bottom:18px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
              <span style="font-size:12px;color:var(--t3);">Buy-in</span>
              <span style="font-size:13px;font-family:var(--mono);color:var(--green)" id="disp-bi-val">$${buyin}</span>
            </div>
            <input type="range" min="11" max="10000" step="11" value="${buyin}" oninput="S.dispBuyin=parseInt(this.value);document.getElementById('disp-bi-val').textContent='$'+this.value;rerunDisp()">
          </div>
          <div style="margin-bottom:18px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
              <span style="font-size:12px;color:var(--t3);">Swap %</span>
              <span style="font-size:13px;font-family:var(--mono);color:var(--green)" id="disp-pct-val">${pct}%</span>
            </div>
            <input type="range" min="1" max="50" value="${pct}" oninput="S.dispPct=parseInt(this.value);document.getElementById('disp-pct-val').textContent=this.value+'%';rerunDisp()">
          </div>
          <div style="margin-bottom:6px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
              <span style="font-size:12px;color:var(--t3);">Simulations</span>
              <span style="font-size:13px;font-family:var(--mono);color:var(--green)" id="disp-sim-val">${n}</span>
            </div>
            <input type="range" min="100" max="5000" step="100" value="${n}" oninput="S.dispSims=parseInt(this.value);document.getElementById('disp-sim-val').textContent=this.value;rerunDisp()">
          </div>
        </div>

        <div class="sec-hd" style="margin-top:16px;">Key metrics</div>
        <div class="card">
          ${[
            ['Avg profit per swap', fm(Math.round(avgProfit))],
            ['Win rate', (wins/n*100).toFixed(1)+'%'],
            ['5th percentile', fm(Math.round(p5))],
            ['25th percentile', fm(Math.round(p25))],
            ['75th percentile', fm(Math.round(p75))],
            ['95th percentile', fm(Math.round(p95))],
            ['Worst case', fm(Math.round(maxLoss))],
            ['Best case', fm(Math.round(maxWin))],
          ].map(([l,v])=>`
            <div style="display:flex;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--b1);font-size:12.5px;">
              <span style="color:var(--t3)">${l}</span>
              <span style="font-family:var(--mono);color:${v.startsWith('+')?'var(--green)':v.startsWith('-')?'var(--red)':'var(--t1)'}">${v}</span>
            </div>`).join('')}
        </div>
      </div>

      <div>
        <div class="sec-hd">Profit distribution (${n} simulations)</div>
        <div class="card card-pad" id="disp-hist">
          <div style="display:flex;align-items:flex-end;gap:3px;height:140px;margin-bottom:6px;">
            ${hist.map((h,i)=>{
              const val=maxLoss+step*i;
              const pct2=maxH?h/maxH*100:0;
              const isPos=val>=0;
              return `<div title="${fm(Math.round(val))}: ${h} cases" style="flex:1;background:${isPos?'var(--green)':'var(--red)'};opacity:${isPos?0.75:0.55};border-radius:2px 2px 0 0;height:${Math.max(2,pct2)}%;min-height:2px;transition:height .4s ease;"></div>`;
            }).join('')}
          </div>
          <div style="display:flex;justify-content:space-between;font-size:10px;font-family:var(--mono);color:var(--t3);">
            <span>${fm(Math.round(maxLoss))}</span>
            <span style="color:var(--t3)">0</span>
            <span>${fm(Math.round(maxWin))}</span>
          </div>
        </div>

        <div style="margin-top:16px;" class="sec-hd">What does this mean?</div>
        <div class="card card-pad">
          <p style="font-size:13px;color:var(--t2);line-height:1.7;">
            With a <strong style="color:var(--t1)">$${buyin}</strong> buy-in and <strong style="color:var(--t1)">${pct}%</strong> swap — 
            your expected profit per deal is <strong style="color:${avgProfit>=0?'var(--green)':'var(--red)'}">${fm(Math.round(avgProfit))}</strong> per tournament on average. 
            Swaps are nearly EV-neutral in isolation — their real value is variance reduction. 
            In ${(wins/n*100).toFixed(0)}% of simulated cases you come out ahead on a single event.
          </p>
          <p style="font-size:13px;color:var(--t2);line-height:1.7;margin-top:10px;">
            The key insight: doing more swaps across more tournaments smooths out the luck. 
            10 independent swaps of ${pct}% each effectively removes ~${Math.round(pct*10*0.9)}% of your single-session variance.
          </p>
        </div>
      </div>
    </div>
  </div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function navigate(page) { S.page=page; render(); window.scrollTo(0,0); }
function setSwapTab(t) { S.swapTab=t; render(); }
function setSearch(v) { S.searchQ=v; render(); }
function setRoomFilter(r) { S.roomFilter=r; render(); }
function openModal(type,data) { S.showModal=type; S.modalData=data||null; render(); }
function closeModal(e) { if(!e||e.target.classList.contains('overlay')) { S.showModal=null; S.modalData=null; render(); } }
function sendOffer(pid) { S.showModal='offer'; S.modalData=pid; render(); }
function openSwapDetail(id) { S.showModal='swap-detail'; S.modalData=id; render(); }
function openPlayerProfile(id) { S.showModal='player-profile'; S.modalData=id; render(); }
function rerunDisp() { render(); }

function doCreateSwap() {
  const pid=document.getElementById('mi-partner').value;
  const tourn=document.getElementById('mi-tourn').value;
  const pct=parseFloat(document.getElementById('mi-pct').value);
  const buyin=parseFloat(document.getElementById('mi-buyin').value);
  if(!pid||!tourn||!pct||!buyin){toast('Fill in all fields',false);return;}
  const p=PLAYERS.find(x=>x.id===pid);
  swaps.unshift({id:'s'+Date.now(),partner:p,tourn,pct,buyin,myRes:0,theirRes:0,status:'active',created:new Date().toISOString().slice(0,10)});
  S.showModal=null;
  toast('Swap created — link copied');
  render();
}

function doSendOffer(pid) {
  const tourn=document.getElementById('oi-tourn').value;
  const pct=parseFloat(document.getElementById('oi-pct').value);
  const buyin=parseFloat(document.getElementById('oi-buyin').value);
  const msg=document.getElementById('oi-msg').value||'Hey, want to swap?';
  if(!tourn||!pct||!buyin){toast('Fill required fields',false);return;}
  const p=PLAYERS.find(x=>x.id===pid);
  offers.push({id:'o'+Date.now(),to:p,type:'sent',tourn,pct,buyin,msg,ts:'just now',status:'pending'});
  S.showModal=null;
  toast('Offer sent to '+p.name);
  render();
}

function respondOffer(id,accept) {
  const o=offers.find(x=>x.id===id);
  if(!o) return;
  if(accept) {
    o.status='accepted';
    swaps.unshift({id:'s'+Date.now(),partner:o.from,tourn:o.tourn,pct:o.pct,buyin:o.buyin,myRes:0,theirRes:0,status:'active',created:new Date().toISOString().slice(0,10)});
    toast('Offer accepted — swap created');
  } else {
    o.status='declined';
    toast('Offer declined');
  }
  render();
}

function submitResult(id) {
  const sw=swaps.find(s=>s.id===id);
  if(!sw) return;
  const myR=parseInt(prompt(`Your result in "${sw.tourn}" ($):`));
  if(isNaN(myR)||myR<0) return;
  sw.myRes=myR;
  sw.theirRes=Math.floor(Math.random()*sw.buyin*8);
  sw.status='closed';
  S.showModal='swap-detail'; S.modalData=id;
  toast('Result submitted');
  render();
}

function copyLink(id) {
  toast('Link copied: swaptrack.gg/s/'+id.toUpperCase());
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

  const navItems=[
    {id:'dashboard', label:'Dashboard', ico:'home'},

    {id:'players',   label:'Players',   ico:'users'},
    {id:'offers',    label:'Offers',    ico:'bell', notif:offers.filter(o=>o.type==='incoming'&&o.status==='pending').length},
    {id:'stats',     label:'Stats',     ico:'chart'},

  let pageHTML='';

  else if(S.page==='offers') pageHTML=pgOffers();

  let modalHTML='';
  if(S.showModal==='new-swap')      modalHTML=modalNewSwap();

  else if(S.showModal==='player-profile') { const p=PLAYERS.find(x=>x.id===S.modalData); if(p) modalHTML=modalPlayerProfile(p); }

  document.getElementById('root').innerHTML=`
    <div class="shell">
      <aside class="sidebar">
        <div class="sb-head">
          <div class="sb-logo">SwapTrack</div>
          <div class="sb-sub">Poker swap manager</div>
        </div>
        <nav class="sb-nav">
          <div class="sb-section">Menu</div>
          ${navItems.map(n=>`
            <div class="sb-item ${S.page===n.id?'active':''}" onclick="navigate('${n.id}')">
              ${ic[n.ico]} ${n.label}
              ${n.notif?`<span class="n-dot"></span>`:''}
            </div>`).join('')}
        </nav>
